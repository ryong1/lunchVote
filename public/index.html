<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘 뭐 먹지?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="view-main" class="page active">
        <div class="header">
            <div class="header-left">
                <h1>오늘 뭐 먹지?</h1>
            </div>
            <div class="header-right">
                <button class="btn-add-top" onclick="showPage('view-add')">+ 투표 등록</button>
            </div>
        </div>

        <main class="container">
            <div id="timer-card" class="card">
                <div class="timer-container">
                    <span class="timer-label">남은 시간</span>
                    <div id="timer-display" class="timer-display">00:00</div>
                </div>
                
                <div class="share-actions">
                    <div class="link-info" id="currentLink">URL 불러오는 중...</div>
                    <div class="button-group">
                        <button class="btn-small" onclick="copyToClipboard()">복사</button>
                        <button class="btn-small" onclick="nativeShare()">공유</button>
                    </div>
                </div>
            </div>

            <div id="extend-panel" class="card extend-card" style="display:none;">
                <p class="extend-msg">투표가 종료됐어요. 시간을 연장할까요?</p>
                <div class="extend-btns">
                    <button onclick="extendVote(1)">+1분</button>
                    <button onclick="extendVote(3)">+3분</button>
                    <button onclick="extendVote(5)">+5분</button>
                    <button onclick="extendVote(10)">+10분</button>
                    <button class="extend-keep" onclick="endVote()">종료하기</button>
                </div>
            </div>

            <div class="card" id="vote-map-card" style="display:none;">
                <h3 id="vote-map-title">후보 위치</h3>
                <div id="voteMap" class="map-box"></div>
            </div>

            <div class="card">
                <h3>투표 결과</h3>
                <div id="menuList"></div>
                <button id="randomBtn" class="btn-sub random-btn" onclick="pickRandom()" style="display:none;">🎲 랜덤으로 골라줘</button>
            </div>
            
            </main>
    </section>

    <section id="view-add" class="page" style="display:none;">
        <div class="header">
            <button class="btn-back" onclick="showPage('view-main')" aria-label="뒤로가기">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <h1>오늘의 후보</h1>
        </div>
        
        <main class="container">
            <div class="card">
                <h3>맛집 검색</h3>
                <input type="hidden" id="locationInput" value="서울특별시 강남구">
                <div id="location-controls" class="loc-controls"></div>
                <div class="input-row">
                    <input type="text" id="mapSearchInput" placeholder="음식·식당 이름">
                    <button onclick="searchPlaces()" class="btn-main">검색</button>
                </div>
                <div id="cat-filters" class="cat-filters">
                    <button type="button" class="cat-chip active" data-cat="">전체</button>
                    <button type="button" class="cat-chip" data-cat="한식">한식</button>
                    <button type="button" class="cat-chip" data-cat="일식">일식</button>
                    <button type="button" class="cat-chip" data-cat="중식">중식</button>
                    <button type="button" class="cat-chip" data-cat="양식">양식</button>
                    <button type="button" class="cat-chip" data-cat="치킨">치킨</button>
                    <button type="button" class="cat-chip" data-cat="분식">분식</button>
                    <button type="button" class="cat-chip" data-cat="카페">카페</button>
                    <button type="button" class="cat-chip" data-cat="고기">고기</button>
                </div>
                <div id="map" class="map-box"><div class="map-msg">지도를 불러오는 중...</div></div>
                <button type="button" class="btn-sub area-btn" onclick="searchThisArea()">이 지역에서 검색</button>
                <div id="search-results" class="search-results-list"></div>
            </div>

            <div class="card">
                <h3>직접 메뉴 입력</h3>
                <div class="input-row">
                    <input type="text" id="menuInput" placeholder="예: 피자, 돈까스">
                    <button onclick="addMenuToList()" class="btn-main">추가</button>
                </div>
            </div>
            
            <div class="card" id="selected-menu-card">
                <h3>선택된 후보 리스트 <span id="temp-count">0</span></h3>
                <div id="tempMenuList" class="temp-menu-list-container">
                    <p class="empty-msg">추가된 메뉴가 없습니다.</p>
                </div>
            </div>

            <div id="admin-controls" class="admin-section" style="display:none;">
                <div class="card admin-card">
                    <span class="admin-label">투표 제한 시간</span>
                    <div class="wheel-picker">
                        <div class="wheel-col">
                            <div class="wheel" id="wheelMin"></div>
                            <div class="wheel-cap">분</div>
                        </div>
                        <div class="wheel-colon">:</div>
                        <div class="wheel-col">
                            <div class="wheel" id="wheelSec"></div>
                            <div class="wheel-cap">초</div>
                        </div>
                        <div class="wheel-center" aria-hidden="true"></div>
                    </div>
                </div>
            </div>

            <div class="submit-area">
                <button onclick="submitFinalVote()" class="btn-admin btn-submit" id="submitBtn">
                    이 메뉴들로 투표 시작하기
                </button>
            </div>
        </main>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
