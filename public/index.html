<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘 뭐 먹지?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="view-main" class="page active">
        <div class="header">
            <div class="header-left">
                <h1>🍱 오늘 뭐 먹지?</h1>
            </div>
            <div class="header-right">
                <button class="btn-add-top" onclick="showPage('view-add')">+ 투표 등록</button>
            </div>
        </div>

        <main class="container">
            <div id="timer-card" class="card">
                <div class="timer-container">
                    <span class="timer-label">남은 시간</span>
                    <div id="timer-display" class="timer-display">00:00</div>
                </div>
                
                <div class="share-actions">
                    <div class="link-info" id="currentLink">URL 불러오는 중...</div>
                    <div class="button-group">
                        <button class="btn-small" onclick="copyToClipboard()">🔗복사</button>
                        <button class="btn-small" onclick="nativeShare()">💬공유</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>📊 투표 결과</h3>
                <div id="menuList"></div>
            </div>
            
            </main>
    </section>

    <section id="view-add" class="page" style="display:none;">
        <div class="header">
            <button class="btn-back" onclick="showPage('view-main')">&lt;</button>
            <h1>🍱 투표 만들기</h1>
        </div>
        
        <main class="container">
            <div id="admin-controls" class="admin-section" style="display:none;">
                <div class="card admin-card">
                    <span class="admin-label">⏰ 투표 제한 시간 설정</span>
                    <div class="input-row">
                        <input type="number" id="timeInput" placeholder="분 단위 (예: 10)">
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>✍️ 직접 메뉴 입력</h3>
                <div class="input-row">
                    <input type="text" id="menuInput" placeholder="예: 김치찌개, 돈까스">
                    <button onclick="addMenuToList()" class="btn-main">추가</button>
                </div>
            </div>

            <div class="card">
                <h3>📍 맛집 검색</h3>
                <div class="input-row">
                    <input type="text" id="mapSearchInput" placeholder="장소나 식당 이름...">
                    <button onclick="searchPlaces()" class="btn-sub">검색</button>
                </div>
                <div id="search-results" class="search-results-list"></div>
            </div>
            
            <div class="card" id="selected-menu-card">
                <h3>✅ 선택된 후보 리스트 <span id="temp-count" style="font-size: 12px; color: var(--primary-color); margin-left: 5px;">0</span></h3>
                <div id="tempMenuList" class="temp-menu-list-container">
                    <p class="empty-msg" style="color: var(--text-light); font-size: 13px; text-align: center; width: 100%; padding: 20px 0;">추가된 메뉴가 없습니다.</p>
                </div>
            </div>

            <div class="submit-area">
                <button onclick="submitFinalVote()" class="btn-admin" style="width: 100%; height: 52px; font-size: 16px; box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);">
                    🚀 이 메뉴들로 투표 시작하기
                </button>
            </div>
        </main>
    </section>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
